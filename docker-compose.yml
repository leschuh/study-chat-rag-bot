version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: studychat-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  studychat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studychat-app
    ports:
      - "8080:8080"
    volumes:
      - ./collected-content:/app/collected-content
    environment:
      - QDRANT_HOST=qdrant
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_storage:
