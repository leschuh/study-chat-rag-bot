version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: studychat-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  studychat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studychat-app
    ports:
      - "8080:8080"
    volumes:
      - ./collected-content:/app/collected-content
    environment:
      - QDRANT_HOST=qdrant
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_storage:
