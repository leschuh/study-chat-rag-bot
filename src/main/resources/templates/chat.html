<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyChat - Chat mit KI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #090d16;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.05);
            --primary: #4e8cff;
            --text-main: #f0f4f8;
            --text-muted: #8b9bb4;
        }

        body {
            background: radial-gradient(circle at top right, #111a2c, var(--bg-color));
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: #2a3441;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3e4c5e;
        }

        /* Navbar update */
        .navbar {
            background: var(--glass-bg) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
        }
        .navbar-brand, .nav-link {
            color: var(--text-main) !important;
        }
        .nav-link.active {
            color: var(--primary) !important;
            font-weight: 600;
        }

        .chat-container {
            height: 65vh;
            overflow-y: auto;
            padding: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }
        
        .message {
            padding: 12px 18px;
            border-radius: 20px;
            margin-bottom: 15px;
            max-width: 80%;
            position: relative;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            background: linear-gradient(135deg, #4e8cff, #2a5cbd);
            color: #fff;
            margin-left: auto;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(78, 140, 255, 0.3);
        }
        .ai-message {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            margin-right: auto;
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .message-time {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
            text-align: right;
        }
        .user-message .message-time {
            color: rgba(255, 255, 255, 0.8);
        }
        
        .data-selector {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        
        .typing-indicator {
            display: none;
            margin-right: auto;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            padding: 12px 18px;
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            margin-bottom: 15px;
            width: fit-content;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--primary);
            animation: wave 1.3s linear infinite;
            margin-right: 4px;
        }
        .dot:nth-child(2) { animation-delay: -1.1s; }
        .dot:nth-child(3) { animation-delay: -0.9s; margin-right: 0; }
        
        @keyframes wave {
            0%, 60%, 100% { transform: initial; }
            30% { transform: translateY(-5px); }
        }
        
        .job-info {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 10px;
        }
        
        /* Modern Inputs */
        .form-control, .form-select {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .form-control:focus, .form-select:focus {
            background-color: rgba(0, 0, 0, 0.3);
            border-color: var(--primary);
            box-shadow: 0 0 0 0.25rem rgba(78, 140, 255, 0.25);
            color: var(--text-main);
            outline: none;
        }
        .form-control::placeholder {
            color: var(--text-muted);
        }
        .form-control:disabled, .form-select:disabled {
            background-color: rgba(0, 0, 0, 0.1);
            color: rgba(255,255,255,0.3);
            border-color: transparent;
        }
        
        /* Input Area Container */
        .input-area {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        
        /* Buttons */
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
            border-radius: 8px;
            padding: 8px 20px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-primary:hover:not(:disabled) {
            background-color: #3a78eb;
            border-color: #3a78eb;
            box-shadow: 0 0 15px rgba(78, 140, 255, 0.4);
            transform: translateY(-1px);
        }
        .btn-primary:disabled {
            background-color: #2a3441;
            border-color: #2a3441;
            opacity: 0.7;
        }
        
        /* LLM Warning Banner */
        .llm-warning {
            background: rgba(217, 83, 79, 0.1);
            border: 1px solid rgba(217, 83, 79, 0.3);
            color: #ff8a8a;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(217, 83, 79, 0.1);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">StudyChat</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="/">Crawler</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/chat">Chat</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-12">
            <h1>Chat mit der KI über gecrawlte Daten</h1>

            <div class="data-selector">
                <label for="datasetSelect" class="form-label">Datenset auswählen:</label>
                <select class="form-select" id="datasetSelect">
                    <option value="">Bitte wählen...</option>
                    <optgroup th:if="${!#lists.isEmpty(crawlJobs)}" label="Verfügbare Datensets">
                        <option th:each="job : ${crawlJobs}"
                                th:value="${job.id}"
                                th:text="${job.seedUrls[0] + ' (' + #temporals.format(job.createdAt, 'dd.MM.yyyy HH:mm') + ')'}">
                            Website (Datum)
                        </option>
                    </optgroup>
                </select>
                <div class="job-info mt-2" id="jobInfo"></div>
            </div>

            <div class="chat-container" id="chatContainer">
                <div class="ai-message message">
                    <div>Hallo! Ich bin dein StudyChat-Assistent. Wähle ein Datenset aus und stelle mir Fragen zu den gecrawlten Inhalten.</div>
                    <div class="message-time">Jetzt</div>
                </div>
                <div class="typing-indicator" id="typingIndicator">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            </div>

            <div class="mt-3 input-area">
                <form id="messageForm" class="d-flex">
                    <input type="text" class="form-control me-2" id="messageInput" placeholder="Stelle eine Frage..." disabled>
                    <button type="submit" class="btn btn-primary" disabled id="sendButton">Senden</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const chatContainer = document.getElementById('chatContainer');
        const messageForm = document.getElementById('messageForm');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const datasetSelect = document.getElementById('datasetSelect');
        const typingIndicator = document.getElementById('typingIndicator');
        const jobInfo = document.getElementById('jobInfo');

        let selectedJobId = null;

        // Event Listener für die Datenset-Auswahl
        datasetSelect.addEventListener('change', function() {
            selectedJobId = this.value;
            if (selectedJobId) {
                messageInput.disabled = false;
                sendButton.disabled = false;

                // Zeige Job-Informationen an
                const selectedOption = datasetSelect.options[datasetSelect.selectedIndex];

                // Suche nach dem ausgewählten Job
                fetch('/api/jobs/' + selectedJobId)
                    .then(response => response.json())
                    .then(job => {
                        // Jobinformationen anzeigen
                        jobInfo.innerHTML = `
                                <strong>Domain:</strong> ${job.seedUrls.join(', ')} <br>
                                <strong>Gecrawlte URLs:</strong> ${job.crawledUrlsCount} <br>
                                <strong>Abgeschlossen:</strong> ${new Date(job.completedAt).toLocaleString()} <br>
                                <strong>Ausgabeverzeichnis:</strong> ${job.outputDirectory}
                            `;
                    })
                    .catch(error => {
                        console.error('Error fetching job details:', error);
                        jobInfo.textContent = 'Jobinformationen konnten nicht geladen werden.';
                    });

                // Systemnachricht hinzufügen
                addMessage(`Datenset "${selectedOption.text}" ausgewählt. Du kannst jetzt Fragen stellen.`, 'ai');
            } else {
                messageInput.disabled = true;
                sendButton.disabled = true;
                jobInfo.innerHTML = '';
            }
        });

        // Event Listener für das Nachrichtenformular
        messageForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const message = messageInput.value.trim();
            if (!message || !selectedJobId) return;

            // Nachricht des Benutzers anzeigen
            addMessage(message, 'user');
            messageInput.value = '';

            // Typing-Indikator anzeigen
            typingIndicator.style.display = 'block';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // Anfrage an den Server senden
            fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    jobId: selectedJobId,
                    message: message
                })
            })
                .then(response => response.json())
                .then(data => {
                    // Typing-Indikator ausblenden
                    typingIndicator.style.display = 'none';

                    // Antwort der KI anzeigen
                    addMessage(data.response, 'ai');
                })
                .catch(error => {
                    console.error('Error:', error);
                    typingIndicator.style.display = 'none';
                    addMessage('Es ist ein Fehler aufgetreten. Bitte versuche es später erneut.', 'ai');
                });
        });

        // Funktion zum Hinzufügen einer Nachricht zum Chat
        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = sender === 'user' ? 'user-message message' : 'ai-message message';

            const messageText = document.createElement('div');
            messageText.textContent = text;

            const messageTime = document.createElement('div');
            messageTime.className = 'message-time';
            messageTime.textContent = getCurrentTime();

            messageDiv.appendChild(messageText);
            messageDiv.appendChild(messageTime);

            // Füge vor dem typing-indicator ein
            chatContainer.insertBefore(messageDiv, typingIndicator);

            // Scroll to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Hilfsfunktion zum Formatieren der aktuellen Zeit
        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
    });
</script>
</body>
</html>
